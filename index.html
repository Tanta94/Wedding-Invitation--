<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed & Hager's Wedding</title>
    <meta name="description" content="Join us for Mohamed & Hager's wedding celebration.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div class="hearts">
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
            </div>
            <h1>Mohamed & Hager</h1>
            <p class="subtitle">We are getting married</p>
            <div class="event-info">
                <p><strong>Date:</strong> April 23, 2026</p>
                <p><strong>Time:</strong> 5:00 PM - 7:00 PM</p>
                <p><strong>Location:</strong> El-Mosheer Tantawy Mosque</p>
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3456.789!2d31.3830768!3d30.0179326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAxJzA0LjUiTiAzMcKwMjMnMDAuMyJF!5e0!3m2!1sen!2sus!4v1234567890!5m2!1sen!2sus" 
                        style="border:0; width:100%; height:200px;" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>
                <a href="https://www.google.com/maps/dir/?api=1&destination=30.0179326,31.3830768" class="btn" target="_blank">Get Directions</a>
            </div>
        </header>

        <section class="countdown">
            <h2>Countdown to Our Special Day</h2>
            <div id="timer">
                <div class="time-box">
                    <span id="days">00</span>
                    <p>Days</p>
                </div>
                <div class="time-box">
                    <span id="hours">00</span>
                    <p>Hours</p>
                </div>
                <div class="time-box">
                    <span id="minutes">00</span>
                    <p>Minutes</p>
                </div>
                <div class="time-box">
                    <span id="seconds">00</span>
                    <p>Seconds</p>
                </div>
            </div>
        </section>

        <section class="message-section">
            <h2>Share Your Wishes</h2>
            <form id="messageForm">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" placeholder="Your Congratulatory Message" required></textarea>
                <button type="submit" class="btn">Send Wishes</button>
            </form>
            <div id="messages" class="messages-container"></div>
        </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
